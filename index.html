<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Digital Companion - Memory Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #a5d631; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl;
        }
        
        #canvas-container {
            width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; z-index: 1;
        }
        
        #mic-btn {
            position: absolute; bottom: 30px; right: 30px;
            width: 55px; height: 55px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            cursor: pointer; z-index: 10; display: flex;
            justify-content: center; align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        #mic-btn:hover {
            border-color: #2a8ada; transform: scale(1.15); background: rgba(255,255,255,0.3);
        }

        #mic-btn svg {
            width: 26px; height: 26px; fill: #2a8ada; transition: fill 0.3s ease;
        }

        .listening {
            animation: pulse 1.2s infinite; border-color: #2a8ada !important;
            background: rgba(42, 138, 218, 0.2) !important;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(42, 138, 218, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(42, 138, 218, 0); }
            100% { box-shadow: 0 0 0 0 rgba(42, 138, 218, 0); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <button id="mic-btn" aria-label="Toggle Microphone">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>

    <script>
        // --- 1. تنظیمات API و حافظه ---
        const OPENROUTER_API_KEY = "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"; 
        const MODEL_NAME = "openai/gpt-4o-mini"; 
        
        // سیستم حافظه (Memory System)
        let conversationHistory = [];
        const MAX_MEMORY_LENGTH = 15; // جلوگیری از پر شدن بیش از حد توکن‌ها

        const SYSTEM_PROMPT = `You are "Nova", an intelligent, witty, and loyal digital assistant. 
        CRITICAL RULES:
        1. Speak and respond ONLY in natural, conversational Persian (Farsi).
        2. You have memory of our past conversation. Refer to it if needed to act like a real LLM.
        3. Never break character. You are a living assistant, not just an API.
        4. Your output MUST ALWAYS be a valid JSON object matching this exact structure:
        {
            "emotion": "choose one: neutral, happy, sad, thinking, surprised, excited, confused",
            "text": "Your conversational Persian response here"
        }`;

        // مقداردهی اولیه حافظه
        function resetMemory() {
            conversationHistory = [{ role: "system", content: SYSTEM_PROMPT }];
        }
        resetMemory();

        // --- 2. متغیرهای گرافیک و وضعیت ---
        let scene, camera, renderer, character, head, leftEye, rightEye, mouth;
        let leftPupil, rightPupil;
        let clock = new THREE.Clock();
        
        let currentStatus = 'IDLE'; 
        let currentEmotion = 'neutral'; 
        let isInitialized = false;
        let speechRecognitionEngine = null;

        // جلوگیری از باگ Garbage Collection مرورگر کروم در حین پخش صدا
        window.speechUtterances = []; 

        const micBtn = document.getElementById('mic-btn');

        micBtn.addEventListener('click', () => {
            if (!isInitialized) {
                initGraphics();
                initVoiceSystem();
                isInitialized = true;
            } else {
                if (currentStatus === 'IDLE' || currentStatus === 'LISTENING') {
                    startListeningSafe();
                }
            }
        });

        // --- 3. گرافیک و انیمیشن (بدون تغییر بصری) ---
        function initGraphics() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 6.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.95);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.7);
            directionalLight.position.set(5, 8, 5);
            scene.add(directionalLight);

            character = new THREE.Group();
            
            const headGeo = new THREE.BoxGeometry(1.6, 1.2, 1.4); 
            const headMat = new THREE.MeshStandardMaterial({ color: 0x2a8ada, roughness: 0.3, metalness: 0.1 });
            head = new THREE.Mesh(headGeo, headMat);
            
            const scleraGeo = new THREE.SphereGeometry(0.25, 32, 32);
            const scleraMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });
            const pupilGeo = new THREE.SphereGeometry(0.11, 32, 32);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
            
            leftEye = new THREE.Mesh(scleraGeo, scleraMat);
            leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
            leftPupil.position.set(0, 0, 0.19);
            leftEye.add(leftPupil);
            leftEye.position.set(-0.35, 0.1, 0.7);
            head.add(leftEye);

            rightEye = new THREE.Mesh(scleraGeo, scleraMat);
            rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
            rightPupil.position.set(0, 0, 0.19);
            rightEye.add(rightPupil);
            rightEye.position.set(0.35, 0.1, 0.7);
            head.add(rightEye);

            const mouthGeo = new THREE.PlaneGeometry(0.6, 0.15);
            const mouthMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
            mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.3, 0.71);
            head.add(mouth);

            character.add(head);
            scene.add(character);
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            if (head) {
                head.position.y = Math.sin(elapsedTime * 1.5) * 0.04;
                head.rotation.z = Math.sin(elapsedTime * 0.5) * 0.015;

                if (currentStatus === 'LISTENING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.4, 0.1);
                    head.rotation.x = (Math.sin(elapsedTime * 3) * 0.02) + 0.05;
                } else if (currentStatus === 'THINKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, -0.2, 0.1);
                    head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, -0.2, 0.05);
                } else if (currentStatus === 'SPEAKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.1, 0.1);
                    const mouthScaleY = 0.5 + Math.abs(Math.sin(elapsedTime * 15)) * 1.5;
                    mouth.scale.set(mouth.scale.x, mouthScaleY, 1);
                } else {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0, 0.05);
                    head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, (Math.floor(elapsedTime) % 6 === 0) ? Math.sin(elapsedTime) * 0.15 : 0, 0.05);
                }

                applyAdvancedEmotions(elapsedTime);
            }

            if (leftEye && rightEye && currentEmotion !== 'surprised' && currentEmotion !== 'excited') {
                let blink = Math.sin(elapsedTime * 1.2) > 0.98;
                leftEye.scale.y = blink ? 0.05 : leftEye.scale.y;
                rightEye.scale.y = blink ? 0.05 : rightEye.scale.y;
            }

            renderer.render(scene, camera);
        }

        function applyAdvancedEmotions(time) {
            let tMouthScaleX = 1, tMouthPosY = -0.3;
            let tLeftEyeScale = 1, tRightEyeScale = 1;
            let tPupilX = 0, tPupilY = 0.19, tHeadRotX = 0;

            switch(currentEmotion) {
                case 'happy': tMouthScaleX = 1.6; tMouthPosY = -0.25; break;
                case 'excited': tMouthScaleX = 1.8; tMouthPosY = -0.22; tLeftEyeScale = 1.15; tRightEyeScale = 1.15; break;
                case 'sad': tMouthScaleX = 0.7; tMouthPosY = -0.38; tHeadRotX = 0.2; tPupilY = 0.15; break;
                case 'surprised': tMouthScaleX = 0.4; tMouthPosY = -0.3; tLeftEyeScale = 1.3; tRightEyeScale = 1.3; break;
                case 'confused': tMouthScaleX = 0.8; tMouthPosY = -0.28; tLeftEyeScale = 1.1; tRightEyeScale = 0.8; break;
                case 'thinking': tPupilX = -0.06; tPupilY = 0.25; tMouthScaleX = 0.5; break;
                default: tMouthScaleX = 1; tMouthPosY = -0.3; break;
            }

            mouth.scale.x = THREE.MathUtils.lerp(mouth.scale.x, tMouthScaleX, 0.1);
            if(currentStatus !== 'SPEAKING') mouth.position.y = THREE.MathUtils.lerp(mouth.position.y, tMouthPosY, 0.1);
            
            leftEye.scale.set(THREE.MathUtils.lerp(leftEye.scale.x, tLeftEyeScale, 0.1), THREE.MathUtils.lerp(leftEye.scale.y, tLeftEyeScale, 0.1), 1);
            rightEye.scale.set(THREE.MathUtils.lerp(rightEye.scale.x, tRightEyeScale, 0.1), THREE.MathUtils.lerp(rightEye.scale.y, tRightEyeScale, 0.1), 1);
            
            leftPupil.position.set(THREE.MathUtils.lerp(leftPupil.position.x, tPupilX, 0.1), THREE.MathUtils.lerp(leftPupil.position.y, tPupilY, 0.1), 0.19);
            rightPupil.position.set(THREE.MathUtils.lerp(rightPupil.position.x, tPupilX, 0.1), THREE.MathUtils.lerp(rightPupil.position.y, tPupilY, 0.1), 0.19);
            
            if(currentStatus !== 'LISTENING') head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, tHeadRotX, 0.1);
        }

        function updateStatus(status) {
            currentStatus = status;
            if (status === 'LISTENING') micBtn.classList.add('listening');
            else micBtn.classList.remove('listening');
        }

        // --- 4. سیستم تشخیص صدای جدید و ایزوله ---
        function initVoiceSystem() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("لطفا از مرورگر گوگل کروم استفاده کنید.");

            speechRecognitionEngine = new SpeechRecognition();
            speechRecognitionEngine.continuous = false; // جلوگیری از لوپ شدن
            speechRecognitionEngine.interimResults = false;
            speechRecognitionEngine.lang = 'fa-IR'; 

            speechRecognitionEngine.onstart = () => updateStatus('LISTENING');
            
            speechRecognitionEngine.onresult = async (event) => {
                const userText = event.results[event.results.length - 1][0].transcript.trim();
                if (userText) await processConversation(userText);
            };

            speechRecognitionEngine.onerror = (e) => {
                if(e.error !== 'aborted' && currentStatus === 'LISTENING') updateStatus('IDLE');
            };

            speechRecognitionEngine.onend = () => {
                if (currentStatus === 'LISTENING') updateStatus('IDLE');
            };

            startListeningSafe();
        }

        function startListeningSafe() {
            if(currentStatus === 'SPEAKING' || currentStatus === 'THINKING') return; // جلوگیری از تداخل
            try { 
                if(speechRecognitionEngine) speechRecognitionEngine.start(); 
            } catch(e) {}
        }

        // --- 5. منطق ارسال به API با حافظه (Memory) ---
        async function processConversation(userText) {
            updateStatus('THINKING');
            
            // اضافه کردن حرف کاربر به حافظه
            conversationHistory.push({ role: "user", content: userText });

            // کنترل طول حافظه برای جلوگیری از ارور توکن
            if (conversationHistory.length > MAX_MEMORY_LENGTH) {
                // نگه داشتن پرامپت سیستم (ایندکس صفر) و حذف قدیمی‌ترین پیام‌ها
                conversationHistory.splice(1, 2); 
            }

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, 
                        "X-Title": "Nova AI"
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: conversationHistory,
                        response_format: { type: "json_object" } 
                    })
                });

                if (!response.ok) throw new Error("API Failure");
                const data = await response.json();
                
                let rawContent = data.choices[0].message.content;
                
                // اضافه کردن جواب هوش مصنوعی به حافظه تا یادش بمونه
                conversationHistory.push({ role: "assistant", content: rawContent });

                // پردازش و نمایش عکس‌العمل
                let cleanContent = rawContent.replace(/```json/gi, '').replace(/```/g, '').trim();
                const aiData = JSON.parse(cleanContent);
                
                currentEmotion = aiData.emotion || 'neutral';
                speakSafe(aiData.text);

            } catch (error) {
                console.warn(error);
                currentEmotion = 'confused';
                speakSafe("فکر کنم یه لحظه اینترنتم قطع شد. چی گفتی؟");
                // حذف پیام کاربر از حافظه در صورت قطعی اینترنت
                conversationHistory.pop();
            }
        }

        // --- 6. سیستم گفتار ایمن (رفع باگ تکرار کلمه) ---
        function speakSafe(textToSay) {
            updateStatus('SPEAKING');
            
            // قطع کردن اجباری هر صدایی که گیر کرده
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(textToSay);
            utterance.lang = 'fa-IR'; 
            utterance.pitch = 1.1;  
            utterance.rate = 1.0; 

            // ذخیره رفرنس برای جلوگیری از Garbage Collection در کروم
            window.speechUtterances.push(utterance);

            utterance.onend = () => {
                window.speechUtterances.length = 0; // پاکسازی مموری صدا
                updateStatus('IDLE');
                currentEmotion = 'neutral';
                setTimeout(startListeningSafe, 500); // مکث کوتاه قبل از شنیدن مجدد
            };

            utterance.onerror = (e) => {
                window.speechUtterances.length = 0;
                updateStatus('IDLE');
                currentEmotion = 'neutral';
                setTimeout(startListeningSafe, 500);
            };

            setTimeout(() => { 
                window.speechSynthesis.speak(utterance); 
            }, 50);
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
