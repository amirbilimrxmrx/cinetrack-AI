<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nura - AI Companion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050505;
            color: white;
            font-family: 'Vazirmatn', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(180deg, #0f172a 0%, #4c1d95 50%, #0f172a 100%);
        }

        /* Invisible UI Overlay */
        .ui-layer {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #mic-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        #mic-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #mic-btn:active {
            transform: scale(0.95);
        }

        #mic-btn.recording {
            background: rgba(239, 68, 68, 0.3);
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        #status-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            height: 20px;
            font-weight: 700;
        }

        #subtitles {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 80%;
            text-align: center;
            font-size: 24px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="subtitles"></div>

    <div class="ui-layer">
        <div id="status-text">برای صحبت کلیک کنید</div>
        <button id="mic-btn" title="Speak">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                <line x1="12" y1="19" x2="12" y2="23" />
                <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
        </button>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r158/three.min.js"></script>
    
    <script>
        // ==========================================
        // 1. STATE MANAGEMENT
        // ==========================================
        let state = {
            emotion: 'neutral',
            isListening: false,
            isThinking: false,
            isSpeaking: false,
            apiKey: localStorage.getItem('openai_api_key') || null
        };

        const statusText = document.getElementById('status-text');
        const subtitles = document.getElementById('subtitles');

        function updateStatusText() {
            if (state.isListening) statusText.textContent = "دارم گوش میدم...";
            else if (state.isThinking) statusText.textContent = "دارم فکر میکنم...";
            else if (state.isSpeaking) statusText.textContent = "دارم حرف میزنم...";
            else statusText.textContent = "برای صحبت کلیک کنید";
        }

        // ==========================================
        // 2. THREE.JS SCENE & PROCEDURAL CHARACTER
        // ==========================================
        let scene, camera, renderer, characterGroup, head, leftEye, rightEye, mouth;
        let clock = new THREE.Clock();
        let audioLevel = 0;

        function initThree() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0.5, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffeedd, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            const rimLight = new THREE.SpotLight(0x7080ff, 1.5);
            rimLight.position.set(-5, 5, 5);
            rimLight.angle = 0.3;
            scene.add(rimLight);

            // Character Construction
            characterGroup = new THREE.Group();
            scene.add(characterGroup);

            const bodyMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xE6C7FF, 
                roughness: 0.3, 
                metalness: 0.1,
                emissive: 0x6b21a8,
                emissiveIntensity: 0.1
            });

            const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.1 });
            const mouthMaterial = new THREE.MeshStandardMaterial({ color: 0x831843, side: THREE.DoubleSide });
            const highlightMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5 });

            // Body
            const bodyGeo = new THREE.CapsuleGeometry(0.8, 1, 8, 16);
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMaterial);
            bodyMesh.position.y = -1.5;
            characterGroup.add(bodyMesh);

            // Head Group
            head = new THREE.Group();
            head.position.y = 0.5;
            characterGroup.add(head);

            // Head
            const headGeo = new THREE.SphereGeometry(0.8, 32, 32);
            const headMesh = new THREE.Mesh(headGeo, bodyMaterial);
            headMesh.castShadow = true;
            head.add(headMesh);

            // Ears
            const earGeo = new THREE.ConeGeometry(0.3, 0.6, 16);
            const leftEar = new THREE.Mesh(earGeo, bodyMaterial);
            leftEar.position.set(-0.7, 0.5, 0);
            leftEar.rotation.z = 0.3;
            head.add(leftEar);

            const rightEar = new THREE.Mesh(earGeo, bodyMaterial);
            rightEar.position.set(0.7, 0.5, 0);
            rightEar.rotation.z = -0.3;
            head.add(rightEar);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.15, 16, 16);
            leftEye = new THREE.Mesh(eyeGeo, eyeMaterial);
            leftEye.position.set(-0.3, 0.1, 0.7);
            head.add(leftEye);

            rightEye = new THREE.Mesh(eyeGeo, eyeMaterial);
            rightEye.position.set(0.3, 0.1, 0.7);
            head.add(rightEye);

            // Eye Highlights
            const highlightGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const lHighlight = new THREE.Mesh(highlightGeo, highlightMaterial);
            lHighlight.position.set(-0.25, 0.15, 0.85);
            head.add(lHighlight);

            const rHighlight = new THREE.Mesh(highlightGeo, highlightMaterial);
            rHighlight.position.set(0.35, 0.15, 0.85);
            head.add(rHighlight);

            // Mouth
            const mouthGeo = new THREE.SphereGeometry(0.1, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            mouth = new THREE.Mesh(mouthGeo, mouthMaterial);
            mouth.position.set(0, -0.3, 0.7);
            head.add(mouth);

            window.addEventListener('resize', onResize, false);
            animate();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==========================================
        // 3. PROCEDURAL ANIMATION & BUG FIXES
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            const delta = clock.getDelta();

            // Simulate audio level for lip sync
            if (state.isSpeaking) {
                audioLevel = Math.abs(Math.sin(t * 12) * Math.sin(t * 7)) * 0.5;
            } else {
                audioLevel = THREE.MathUtils.lerp(audioLevel, 0, 0.1);
            }

            // Breathing & Body Bounce
            if (characterGroup) {
                characterGroup.position.y = Math.sin(t * 1.2) * 0.05;
                characterGroup.scale.y = 1 + audioLevel * 0.1;
                characterGroup.scale.x = 1 - audioLevel * 0.05;
            }

            // Head Logic
            if (head) {
                let targetX = Math.sin(t * 0.5) * 0.1;
                let targetY = Math.sin(t * 0.3) * 0.15;

                // Listening State: Lean in and tilt head slightly
                if (state.isListening) {
                    targetY += 0.2;
                    targetX -= 0.1;
                }
                
                // Thinking State: Look up briefly (Fixed eye rolling by keeping it subtle)
                if (state.isThinking) {
                    targetX = -0.25; 
                }

                head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, targetX, 0.05);
                head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, targetY, 0.05);
                head.rotation.z = THREE.MathUtils.lerp(head.rotation.z, Math.sin(t * 0.7) * 0.05, 0.05);

                // Happy bounce
                if (state.emotion === 'excited' || state.emotion === 'happy') {
                    head.position.y = 0.5 + Math.abs(Math.sin(t * 8)) * 0.1;
                } else {
                    head.position.y = 0.5;
                }
            }

            // BUG FIX: Natural Eye Saccades (Strict bounding to prevent unnatural rolling)
            if (leftEye && rightEye) {
                const saccadeX = Math.sin(t * 0.8) * 0.1; 
                const saccadeY = Math.sin(t * 0.6) * 0.05 - 0.02; 
                
                leftEye.rotation.y = THREE.MathUtils.lerp(leftEye.rotation.y, saccadeX, 0.05);
                leftEye.rotation.x = THREE.MathUtils.lerp(leftEye.rotation.x, saccadeY, 0.05);
                
                rightEye.rotation.y = THREE.MathUtils.lerp(rightEye.rotation.y, saccadeX, 0.05);
                rightEye.rotation.x = THREE.MathUtils.lerp(rightEye.rotation.x, saccadeY, 0.05);

                // Blinking
                const blink = Math.sin(t * 0.3) > 0.95 ? 0.1 : 1; 
                leftEye.scale.y = THREE.MathUtils.lerp(leftEye.scale.y, blink, 0.2);
                rightEye.scale.y = THREE.MathUtils.lerp(rightEye.scale.y, blink, 0.2);
            }

            // Mouth Lip Sync
            if (mouth) {
                const mouthScale = state.isSpeaking ? 1.5 + Math.random() * 0.5 : 0.5;
                mouth.scale.y = THREE.MathUtils.lerp(mouth.scale.y, mouthScale, 0.3);
            }

            renderer.render(scene, camera);
        }

        // ==========================================
        // 4. AI & SPEECH PIPELINE (STT -> LLM -> TTS)
        // ==========================================
        const micBtn = document.getElementById('mic-btn');
        let recognition;

        // Initialize Web Speech API
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'fa-IR'; // Strict Farsi
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                processUserSpeech(transcript);
            };

            recognition.onerror = (event) => {
                console.error("Speech error:", event.error);
                resetState();
            };

            recognition.onend = () => {
                if (state.isListening) resetState();
            };
        } else {
            alert("مرورگر شما پشتیبانی نمی‌کند. لطفاً از کروم یا اج استفاده کنید.");
        }

        micBtn.addEventListener('click', () => {
            if (!state.apiKey) {
                const key = prompt("برای شروع، کلید API OpenAI خود را وارد کنید:");
                if (key) {
                    state.apiKey = key;
                    localStorage.setItem('openai_api_key', key);
                } else {
                    return;
                }
            }

            if (state.isSpeaking) {
                window.speechSynthesis.cancel();
                resetState();
                return;
            }

            if (state.isListening) {
                recognition.stop();
                resetState();
            } else {
                try {
                    recognition.start();
                    state.isListening = true;
                    state.isThinking = false;
                    state.isSpeaking = false;
                    micBtn.classList.add('recording');
                    updateStatusText();
                } catch (e) {
                    console.error(e);
                }
            }
        });

        function resetState() {
            state.isListening = false;
            state.isThinking = false;
            state.isSpeaking = false;
            micBtn.classList.remove('recording');
            updateStatusText();
        }

        async function processUserSpeech(text) {
            state.isListening = false;
            state.isThinking = true;
            micBtn.classList.remove('recording');
            updateStatusText();

            const systemPrompt = `
                You are "Nura", a living, breathing, animated digital companion.
                You are warm, funny, empathetic, and deeply curious.
                ABSOLUTE RULES:
                1. You MUST ONLY speak in Persian (Farsi). Never use English unless explicitly asked to translate.
                2. Never output technical jargon, API mentions, or break character.
                3. Never repeat words. Keep responses concise, fluid, and natural (max 2-3 sentences).
                4. Your response MUST be valid JSON matching this exact schema:
                {
                  "emotion": "happy" | "curious" | "sad" | "excited" | "confused" | "neutral",
                  "farsi_response": "Your Farsi text here..."
                }
                Always remain in character.
            `;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: text }
                        ],
                        response_format: { type: "json_object" },
                        frequency_penalty: 0.8, // Prevents repetition
                        presence_penalty: 0.5,
                    })
                });

                if (!response.ok) throw new Error("API Error");
                
                const data = await response.json();
                const payload = JSON.parse(data.choices[0].message.content);

                state.emotion = payload.emotion;
                state.isThinking = false;
                
                speakText(payload.farsi_response);

            } catch (error) {
                console.error(error);
                // Graceful in-character failure (No technical messages exposed)
                state.emotion = 'confused';
                speakText("نمیفهمم چی شد، دوباره بگو؟");
            }
        }

        function speakText(text) {
            state.isSpeaking = true;
            updateStatusText();

            // Show subtitles
            subtitles.textContent = text;
            subtitles.style.opacity = 1;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fa-IR';
            
            // Try to find a Persian voice
            const voices = window.speechSynthesis.getVoices();
            const persianVoice = voices.find(v => v.lang === 'fa-IR');
            if (persianVoice) utterance.voice = persianVoice;

            utterance.onend = () => {
                resetState();
                state.emotion = 'neutral';
                subtitles.style.opacity = 0;
            };

            window.speechSynthesis.speak(utterance);
        }

        // Initialize
        initThree();
        
        // Load voices (some browsers need this event)
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => {};
        }
    </script>
</body>
</html>
