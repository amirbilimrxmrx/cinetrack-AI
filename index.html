<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Digital Companion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle, #2a2a35 0%, #111115 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* واجهة مستخدم شبه مخفية - فقط للتفاعل الأول */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .btn {
            padding: 15px 35px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        #status-indicator {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <button id="start-btn" class="btn">Wake Up Companion</button>
        <div id="status-indicator" style="display: none;">IDLE</div>
    </div>

    <script>
        // --- تنظیمات کلیدهای اتصالات ---
        const GROQ_API_KEY = "YOUR_GROQ_API_KEY_HERE"; // کلید گروک خود را اینجا بگذارید

        // --- متغیرهای گرافیکی Three.js ---
        let scene, camera, renderer, character, head, leftEye, rightEye, mouth;
        let clock = new THREE.Clock();
        
        // --- وضعیت‌های انیمیشن (State Machine) ---
        let currentStatus = 'IDLE'; // IDLE, LISTENING, THINKING, SPEAKING
        let currentEmotion = 'neutral'; // neutral, happy, sad, thinking, surprised

        // --- المان‌های DOM ---
        const startBtn = document.getElementById('start-btn');
        const statusIndicator = document.getElementById('status-indicator');

        // اولویت شروع با تعامل کاربر برای باز شدن قفل میکروفون و صدا
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            statusIndicator.style.display = 'block';
            initGraphics();
            initVoiceSystem();
        });

        // --- ۱. بخش گرافیک و طراحی کاراکتر سه‌بعدی ---
        function initGraphics() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // نورپردازی سینمایی و نرم
            const ambientLight = new THREE.AmbientLight(0x666677, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffeebb, 1.2);
            directionalLight.position.set(5, 5, 4);
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x88ccff, 0.5, 10);
            pointLight.position.set(-3, -2, 2);
            scene.add(pointLight);

            // ساخت یک کاراکتر مینیمال و استایلایز شده (شبیه ربات‌های پیکسار)
            character = new THREE.Group();
            
            // سر کاراکتر
            const headGeo = new THREE.SphereGeometry(0.8, 32, 32);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xdddddf, roughness: 0.2, metalness: 0.1 });
            head = new THREE.Mesh(headGeo, headMat);
            character.add(head);

            // چشم‌ها
            const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff }); // چشم‌های درخشان آبی
            
            leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.25, 0.1, 0.7);
            head.add(leftEye);

            rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.25, 0.1, 0.7);
            head.add(rightEye);

            // دهان (یک خط یا بیضی کوچک برای حالات مختلف)
            const mouthGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.05, 16);
            const mouthMat = new THREE.MeshStandardMaterial({ color: 0x33333b, roughness: 0.5 });
            mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.25, 0.7);
            mouth.rotation.x = Math.PI / 2;
            head.add(mouth);

            scene.add(character);
            character.position.y = -0.2;

            animate();
        }

        // --- ۲. بخش انیمیشن‌های زنده و داینامیک (موتور انیمیشن) ---
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            if (head) {
                // انیمیشن پایه تنفس و زنده بودن (همیشه اجرا می‌شود)
                head.position.y = Math.sin(elapsedTime * 1.5) * 0.03;
                head.rotation.z = Math.sin(elapsedTime * 0.5) * 0.02;

                // مدیریت تغییر انیمیشن‌ها بر اساس حالت سیستم (Status)
                if (currentStatus === 'LISTENING') {
                    // متمایل شدن به جلو و تکان‌های ریز سر به نشانه تایید
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.2, 0.1);
                    head.rotation.x = (Math.sin(elapsedTime * 4) * 0.02) + 0.05;
                } else if (currentStatus === 'THINKING') {
                    // نگاه کردن به بالا و چپ و چرخیدن سر
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0, 0.1);
                    leftEye.position.y = THREE.MathUtils.lerp(leftEye.position.y, 0.2, 0.1);
                    rightEye.position.y = THREE.MathUtils.lerp(rightEye.position.y, 0.2, 0.1);
                    head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, -0.15, 0.05);
                } else if (currentStatus === 'SPEAKING') {
                    // تکان خوردن دهان هماهنگ با فرکانس فرضی صدا
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.1, 0.1);
                    const mouthScale = 0.5 + Math.abs(Math.sin(elapsedTime * 12)) * 1.5;
                    mouth.scale.set(mouthScale, 1, mouthScale);
                    head.rotation.y = Math.sin(elapsedTime * 2) * 0.05;
                } else {
                    // حالت عادی (IDLE) - نگاه کردن تصادفی به اطراف
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0, 0.05);
                    leftEye.position.y = THREE.MathUtils.lerp(leftEye.position.y, 0.1, 0.1);
                    rightEye.position.y = THREE.MathUtils.lerp(rightEye.position.y, 0.1, 0.1);
                    if (Math.floor(elapsedTime) % 6 === 0) {
                        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, Math.sin(elapsedTime) * 0.1, 0.05);
                    }
                }

                // مدیریت احساسات روی اجزای صورت (Emotion)
                applyEmotionMetrics();
            }

            // پلک زدن تصادفی کاراکتر
            if (leftEye && rightEye) {
                let blink = Math.sin(elapsedTime * 0.8) > 0.98;
                leftEye.scale.y = blink ? 0.1 : 1;
                rightEye.scale.y = blink ? 0.1 : 1;
            }

            renderer.render(scene, camera);
        }

        function applyEmotionMetrics() {
            if (currentEmotion === 'happy') {
                mouth.scale.x = THREE.MathUtils.lerp(mouth.scale.x, 2, 0.1);
                leftEye.material.color.setHex(0x00ff88); // سبز پرانرژی
                rightEye.material.color.setHex(0x00ff88);
            } else if (currentEmotion === 'sad') {
                head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, 0.15, 0.05);
                leftEye.material.color.setHex(0x5555ff); // آبی تیره ملایم
                rightEye.material.color.setHex(0x5555ff);
            } else if (currentEmotion === 'surprised') {
                leftEye.scale.set(1.4, 1.4, 1.4);
                rightEye.scale.set(1.4, 1.4, 1.4);
                leftEye.material.color.setHex(0xffaa00); // نارنجی تعجب
                rightEye.material.color.setHex(0xffaa00);
            } else {
                // حالت خنثی
                leftEye.scale.set(1, 1, 1);
                rightEye.scale.set(1, 1, 1);
                leftEye.material.color.setHex(0x00d2ff);
                rightEye.material.color.setHex(0x00d2ff);
            }
        }

        function updateStatus(status) {
            currentStatus = status;
            statusIndicator.innerText = status;
        }

        // --- ۳. سیستم صوتی و اتصال به هوش مصنوعی (Voice & Groq LLM) ---
        function initVoiceSystem() {
            // استفاده از Web Speech API مرورگر برای تشخیص صدا
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Your browser does not support Voice Recognition. Please use Chrome or Edge.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US'; // می‌توانید به 'fa-IR' برای فارسی تغییر دهید

            recognition.onstart = () => updateStatus('LISTENING');
            
            recognition.onresult = async (event) => {
                const userText = event.results[event.results.length - 1][0].transcript;
                console.log("User said:", userText);
                
                recognition.stop(); // موقتاً گوش دادن را متوقف کن تا پاسخ آماده شود
                await askLLM(userText);
            };

            recognition.onend = () => {
                // اگر سیستم در حال صحبت یا فکر نیست، دوباره گوش دادن را فعال کن
                if (currentStatus === 'IDLE' || currentStatus === 'LISTENING') {
                    recognition.start();
                }
            };

            recognition.start();

            // ساخت فانکشن داخلی برای فعال‌سازی مجدد میکروفون پس از صحبت کاراکتر
            window.restartListening = () => {
                updateStatus('LISTENING');
                try { recognition.start(); } catch(e) {}
            };
        }

        // ارتباط با مدل Llama 3.3 در سرویس Groq
        async function askLLM(promptText) {
            updateStatus('THINKING');
            
            const systemPrompt = `You are a living virtual companion. You must respond to the user in a natural, conversational way. 
            Crucially, you must return your response STRICTLY as a JSON object, matching this format exactly:
            {
                "emotion": "choose one: neutral, happy, sad, thinking, surprised",
                "text": "your spoken response here (keep it concise, 1-2 sentences max)"
            }`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: promptText }
                        ],
                        response_format: { type: "json_object" } // اصرار روی خروجی ساختاریافته JSON
                    })
                });

                const data = await response.json();
                const aiResponseData = JSON.parse(data.choices[0].message.content);
                
                currentEmotion = aiResponseData.emotion;
                speak(aiResponseData.text);

            } catch (error) {
                console.error("Error fetching from Groq:", error);
                currentEmotion = 'sad';
                speak("I encountered a connection issue. Please check your API configuration.");
            }
        }

        // سخن گفتن کاراکتر با استفاده از موتور متن به صدای مرورگر (TTS)
        function speak(textToSay) {
            updateStatus('SPEAKING');
            
            const utterance = new SpeechSynthesisUtterance(textToSay);
            utterance.lang = 'en-US';

            utterance.onend = () => {
                updateStatus('IDLE');
                currentEmotion = 'neutral';
                // بعد از تمام شدن دیالوگ، دوباره میکروفون را فعال کن تا بشنود
                if (window.restartListening) window.restartListening();
            };

            window.speechSynthesis.speak(utterance);
        }

        // هماهنگ‌سازی اندازه صفحه در صورت تغییر ابعاد مرورگر
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
