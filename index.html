<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Digital Companion - Persian Cinema Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #a5d631; /* Bright green background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl; /* Set layout for Persian */
        }
        
        #canvas-container {
            width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; z-index: 1;
        }
        
        #mic-btn {
            position: absolute; bottom: 30px; right: 30px;
            width: 55px; height: 55px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            cursor: pointer; z-index: 10; display: flex;
            justify-content: center; align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        #mic-btn:hover {
            border-color: #2a8ada; transform: scale(1.15); background: rgba(255,255,255,0.3);
        }

        #mic-btn svg {
            width: 26px; height: 26px; fill: #2a8ada; transition: fill 0.3s ease;
        }

        .listening {
            animation: pulse 1.2s infinite; border-color: #2a8ada !important;
            background: rgba(42, 138, 218, 0.2) !important;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(42, 138, 218, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(42, 138, 218, 0); }
            100% { box-shadow: 0 0 0 0 rgba(42, 138, 218, 0); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <button id="mic-btn" aria-label="Toggle Microphone">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>

    <script>
        // --- API Configuration ---
        const OPENROUTER_API_KEY = "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"; 
        // Using GPT-4o-Mini via OpenRouter for perfect JSON structure and excellent Persian
        const MODEL_NAME = "openai/gpt-4o-mini"; 

        // --- Graphics Variables ---
        let scene, camera, renderer, character, head, leftEye, rightEye, mouth;
        let leftPupil, rightPupil;
        let clock = new THREE.Clock();
        
        let currentStatus = 'IDLE'; 
        let currentEmotion = 'neutral'; 
        let isInitialized = false;

        const micBtn = document.getElementById('mic-btn');

        micBtn.addEventListener('click', () => {
            if (!isInitialized) {
                initGraphics();
                initVoiceSystem();
                isInitialized = true;
            } else {
                if (window.restartListening) window.restartListening();
            }
        });

        // --- 1. Character Design (Unchanged Visuals) ---
        function initGraphics() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 6.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.95);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.7);
            directionalLight.position.set(5, 8, 5);
            scene.add(directionalLight);

            character = new THREE.Group();
            
            // Blue Head
            const headGeo = new THREE.BoxGeometry(1.6, 1.2, 1.4); 
            const headMat = new THREE.MeshStandardMaterial({ color: 0x2a8ada, roughness: 0.3, metalness: 0.1 });
            head = new THREE.Mesh(headGeo, headMat);
            
            // Eyes
            const scleraGeo = new THREE.SphereGeometry(0.25, 32, 32);
            const scleraMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });
            const pupilGeo = new THREE.SphereGeometry(0.11, 32, 32);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
            
            leftEye = new THREE.Mesh(scleraGeo, scleraMat);
            leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
            leftPupil.position.set(0, 0, 0.19);
            leftEye.add(leftPupil);
            leftEye.position.set(-0.35, 0.1, 0.7);
            head.add(leftEye);

            rightEye = new THREE.Mesh(scleraGeo, scleraMat);
            rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
            rightPupil.position.set(0, 0, 0.19);
            rightEye.add(rightPupil);
            rightEye.position.set(0.35, 0.1, 0.7);
            head.add(rightEye);

            // Mouth
            const mouthGeo = new THREE.PlaneGeometry(0.6, 0.15);
            const mouthMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
            mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.3, 0.71);
            head.add(mouth);

            character.add(head);
            scene.add(character);
            
            animate();
        }

        // --- 2. Advanced Emotional Animation Engine ---
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            if (head) {
                // Organic Idle Movement
                head.position.y = Math.sin(elapsedTime * 1.5) * 0.04;
                head.rotation.z = Math.sin(elapsedTime * 0.5) * 0.015;

                // Status Base Movements
                if (currentStatus === 'LISTENING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.4, 0.1); // Leans in
                    head.rotation.x = (Math.sin(elapsedTime * 3) * 0.02) + 0.05; // Listening nods
                } else if (currentStatus === 'THINKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, -0.2, 0.1); // Leans back
                    head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, -0.2, 0.05); // Looks away
                } else if (currentStatus === 'SPEAKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.1, 0.1);
                    // Lip Sync
                    const mouthScaleY = 0.5 + Math.abs(Math.sin(elapsedTime * 18)) * 1.8;
                    mouth.scale.set(mouth.scale.x, mouthScaleY, 1);
                } else {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0, 0.05);
                    if (Math.floor(elapsedTime) % 6 === 0) {
                        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, Math.sin(elapsedTime) * 0.15, 0.05);
                    } else {
                        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, 0, 0.05);
                    }
                }

                // Complex Emotion Blending
                applyAdvancedEmotions(elapsedTime);
            }

            // Natural Blinking
            if (leftEye && rightEye && currentEmotion !== 'surprised' && currentEmotion !== 'excited') {
                let blink = Math.sin(elapsedTime * 1.2) > 0.98;
                leftEye.scale.y = blink ? 0.05 : leftEye.scale.y;
                rightEye.scale.y = blink ? 0.05 : rightEye.scale.y;
            }

            renderer.render(scene, camera);
        }

        function applyAdvancedEmotions(time) {
            // Target variables to allow smooth lerping
            let tMouthScaleX = 1, tMouthPosY = -0.3;
            let tLeftEyeScale = 1, tRightEyeScale = 1;
            let tPupilX = 0, tPupilY = 0.19; // Default pupil forward
            let tHeadRotX = 0;

            switch(currentEmotion) {
                case 'happy':
                    tMouthScaleX = 1.6; tMouthPosY = -0.25;
                    break;
                case 'excited': // High energy, big eyes, big smile
                    tMouthScaleX = 1.8; tMouthPosY = -0.22;
                    tLeftEyeScale = 1.15; tRightEyeScale = 1.15;
                    tHeadRotX = Math.sin(time * 8) * 0.05; // Slight bouncing
                    break;
                case 'sad':
                    tMouthScaleX = 0.7; tMouthPosY = -0.38;
                    tHeadRotX = 0.2; // Head down
                    tPupilY = 0.15; // Looking down
                    break;
                case 'surprised':
                    tMouthScaleX = 0.4; tMouthPosY = -0.3; 
                    tLeftEyeScale = 1.3; tRightEyeScale = 1.3; // Huge eyes
                    break;
                case 'confused':
                    tMouthScaleX = 0.8; tMouthPosY = -0.28;
                    tLeftEyeScale = 1.1; tRightEyeScale = 0.8; // Asymmetrical eyes
                    tHeadRotX = -0.1;
                    head.rotation.z = THREE.MathUtils.lerp(head.rotation.z, 0.15, 0.1); // Tilt head
                    break;
                case 'proud':
                    tMouthScaleX = 1.3; tMouthPosY = -0.28;
                    tHeadRotX = -0.15; // Head up, looking down nose
                    break;
                case 'shy':
                    tMouthScaleX = 0.9; tMouthPosY = -0.35;
                    tHeadRotX = 0.15; // Head down
                    tPupilY = 0.23; // Looking up from under
                    tPupilX = 0.05; // Looking slightly side
                    break;
                case 'nervous':
                    tMouthScaleX = 0.6; tMouthPosY = -0.3;
                    tPupilX = Math.sin(time * 10) * 0.05; // Eyes darting side to side
                    tLeftEyeScale = 0.9; tRightEyeScale = 0.9;
                    break;
                case 'thinking':
                    tPupilX = -0.06; tPupilY = 0.25; // Look up and left
                    tMouthScaleX = 0.5;
                    break;
                default: // neutral
                    tMouthScaleX = 1; tMouthPosY = -0.3;
                    break;
            }

            // Apply interpolations smoothly
            mouth.scale.x = THREE.MathUtils.lerp(mouth.scale.x, tMouthScaleX, 0.1);
            if(currentStatus !== 'SPEAKING') mouth.position.y = THREE.MathUtils.lerp(mouth.position.y, tMouthPosY, 0.1);
            
            leftEye.scale.set(THREE.MathUtils.lerp(leftEye.scale.x, tLeftEyeScale, 0.1), THREE.MathUtils.lerp(leftEye.scale.y, tLeftEyeScale, 0.1), 1);
            rightEye.scale.set(THREE.MathUtils.lerp(rightEye.scale.x, tRightEyeScale, 0.1), THREE.MathUtils.lerp(rightEye.scale.y, tRightEyeScale, 0.1), 1);
            
            leftPupil.position.set(THREE.MathUtils.lerp(leftPupil.position.x, tPupilX, 0.1), THREE.MathUtils.lerp(leftPupil.position.y, tPupilY, 0.1), 0.19);
            rightPupil.position.set(THREE.MathUtils.lerp(rightPupil.position.x, tPupilX, 0.1), THREE.MathUtils.lerp(rightPupil.position.y, tPupilY, 0.1), 0.19);
            
            if(currentStatus !== 'LISTENING') head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, tHeadRotX, 0.1);
        }

        function updateStatus(status) {
            currentStatus = status;
            if (status === 'LISTENING') {
                micBtn.classList.add('listening');
            } else {
                micBtn.classList.remove('listening');
            }
        }

        // --- 3. Persian Voice Recognition ---
        function initVoiceSystem() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("مرورگر شما از تشخیص صدا پشتیبانی نمی‌کند. لطفا از گوگل کروم استفاده کنید.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'fa-IR'; // Strict Persian

            recognition.onstart = () => updateStatus('LISTENING');
            
            recognition.onresult = async (event) => {
                const userText = event.results[event.results.length - 1][0].transcript;
                recognition.stop(); 
                await askOpenRouter(userText);
            };

            recognition.onend = () => {
                if (currentStatus === 'IDLE' || currentStatus === 'LISTENING') {
                    try { recognition.start(); } catch(e) {}
                }
            };

            recognition.start();

            window.restartListening = () => {
                updateStatus('LISTENING');
                try { recognition.start(); } catch(e) {}
            };
        }

        // --- 4. Brain / OpenRouter Integration ---
        async function askOpenRouter(promptText) {
            updateStatus('THINKING');
            
            // Comprehensive Persona and Output Rules
            const systemPrompt = `You are "Nova", a highly intelligent, loyal, and charming digital assistant (like JARVIS meets a friendly animated character). 
            You are speaking to your user. You are witty, deeply helpful, and conversational.
            CRITICAL RULES:
            1. You MUST speak and respond ONLY in fluent, natural Persian (Farsi).
            2. Never act like a computer program. Never mention APIs, code, or being an AI.
            3. Keep your answers conversational, relatively short, and punchy.
            4. You must output your response STRICTLY as a JSON object with this exact structure:
            {
                "emotion": "choose ONE: neutral, happy, sad, thinking, surprised, excited, confused, proud, shy, nervous",
                "text": "Your Persian response here"
            }`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, 
                        "X-Title": "Nova Digital Companion"
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: promptText }
                        ],
                        response_format: { type: "json_object" } 
                    })
                });

                if (!response.ok) throw new Error("API Connection Failed");
                const data = await response.json();
                
                // Advanced JSON cleaning to prevent "Lost train of thought" crashes
                let content = data.choices[0].message.content;
                // Strip markdown backticks if the model accidentally includes them
                content = content.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const aiResponseData = JSON.parse(content);
                currentEmotion = aiResponseData.emotion || 'neutral';
                speak(aiResponseData.text);

            } catch (error) {
                console.warn("Silent System Error handled smoothly:", error);
                // Graceful fallback in character, in Persian
                currentEmotion = 'confused';
                speak("ببخشید، یک لحظه حواسم پرت شد. داشتی چی می‌گفتی؟");
            }
        }

        // --- 5. Persian Text-To-Speech (TTS) ---
        function speak(textToSay) {
            updateStatus('SPEAKING');
            
            const utterance = new SpeechSynthesisUtterance(textToSay);
            utterance.lang = 'fa-IR'; // Force Persian voice
            utterance.pitch = 1.15; // Slightly higher, friendly voice
            utterance.rate = 1.0; 

            utterance.onend = () => {
                updateStatus('IDLE');
                currentEmotion = 'neutral';
                if (window.restartListening) window.restartListening();
            };

            // Small delay to ensure voices are loaded in the browser
            setTimeout(() => { window.speechSynthesis.speak(utterance); }, 50);
        }

        // Responsive resizing
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
