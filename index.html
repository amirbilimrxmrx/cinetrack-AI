<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Digital Companion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Bright green background matching the reference image */
            background-color: #a5d631; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Minimalist UI - Only a sleek microphone button at the bottom right */
        #mic-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #mic-btn:hover {
            border-color: #2a8ada;
            transform: scale(1.1);
            background: rgba(255,255,255,0.2);
        }

        /* Microphone SVG icon (blue to match character) */
        #mic-btn svg {
            width: 24px;
            height: 24px;
            fill: #2a8ada;
            transition: fill 0.3s ease;
        }

        /* Pulsing animation when actively listening */
        .listening {
            animation: pulse 1.5s infinite;
            border-color: #2a8ada !important;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(42, 138, 218, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(42, 138, 218, 0); }
            100% { box-shadow: 0 0 0 0 rgba(42, 138, 218, 0); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <button id="mic-btn" aria-label="Toggle Microphone">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>

    <script>
        // --- API Configuration ---
        const OPENROUTER_API_KEY = "YOUR_OPENROUTER_API_KEY_HERE"; 
        const MODEL_NAME = "meta-llama/llama-3.3-70b-instruct"; 

        // --- Graphics Variables ---
        let scene, camera, renderer, character, head, leftEye, rightEye, mouth;
        let leftPupil, rightPupil;
        let clock = new THREE.Clock();
        
        // --- System States ---
        let currentStatus = 'IDLE'; 
        let currentEmotion = 'neutral'; 
        let isInitialized = false;

        const micBtn = document.getElementById('mic-btn');

        // Initial interaction unlocks audio context
        micBtn.addEventListener('click', () => {
            if (!isInitialized) {
                initGraphics();
                initVoiceSystem();
                isInitialized = true;
            } else {
                // Manual override to start listening again
                if (window.restartListening) window.restartListening();
            }
        });

        // --- 1. Character & Scene Design ---
        function initGraphics() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Lighting tailored for the bright green background
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(5, 8, 5);
            scene.add(directionalLight);

            character = new THREE.Group();
            
            // Blue Head (matching reference)
            const headGeo = new THREE.BoxGeometry(1.6, 1.2, 1.4); 
            // Applying a slight bevel/rounding effect visually via material
            const headMat = new THREE.MeshStandardMaterial({ color: 0x2a8ada, roughness: 0.3, metalness: 0.1 });
            head = new THREE.Mesh(headGeo, headMat);
            
            // White Sclera with Black Pupils for expressive eyes
            const scleraGeo = new THREE.SphereGeometry(0.25, 32, 32);
            const scleraMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });
            const pupilGeo = new THREE.SphereGeometry(0.12, 32, 32);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
            
            leftEye = new THREE.Mesh(scleraGeo, scleraMat);
            leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
            leftPupil.position.set(0, 0, 0.18);
            leftEye.add(leftPupil);
            leftEye.position.set(-0.35, 0.1, 0.7);
            head.add(leftEye);

            rightEye = new THREE.Mesh(scleraGeo, scleraMat);
            rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
            rightPupil.position.set(0, 0, 0.18);
            rightEye.add(rightPupil);
            rightEye.position.set(0.35, 0.1, 0.7);
            head.add(rightEye);

            // Expressive Mouth (Black interior, white teeth implied via scale later)
            const mouthGeo = new THREE.PlaneGeometry(0.6, 0.15);
            const mouthMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
            mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.3, 0.71);
            head.add(mouth);

            character.add(head);
            scene.add(character);
            
            animate();
        }

        // --- 2. Animation Engine ---
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            if (head) {
                // Organic Idle Breathing
                head.position.y = Math.sin(elapsedTime * 1.5) * 0.04;
                head.rotation.z = Math.sin(elapsedTime * 0.5) * 0.015;

                // State-based postural shifts
                if (currentStatus === 'LISTENING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.3, 0.1);
                    head.rotation.x = (Math.sin(elapsedTime * 4) * 0.01) + 0.05; // Gentle nodding
                } else if (currentStatus === 'THINKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0, 0.1);
                    leftPupil.position.x = THREE.MathUtils.lerp(leftPupil.position.x, -0.05, 0.1);
                    leftPupil.position.y = THREE.MathUtils.lerp(leftPupil.position.y, 0.08, 0.1);
                    rightPupil.position.x = THREE.MathUtils.lerp(rightPupil.position.x, -0.05, 0.1);
                    rightPupil.position.y = THREE.MathUtils.lerp(rightPupil.position.y, 0.08, 0.1);
                    head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, -0.15, 0.05);
                } else if (currentStatus === 'SPEAKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.1, 0.1);
                    // Dynamic Lip Sync Simulation
                    const mouthScaleY = 0.5 + Math.abs(Math.sin(elapsedTime * 15)) * 1.5;
                    mouth.scale.set(1, mouthScaleY, 1);
                    head.rotation.y = Math.sin(elapsedTime * 1.5) * 0.04;
                } else {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0, 0.05);
                    leftPupil.position.set(0, 0, 0.18);
                    rightPupil.position.set(0, 0, 0.18);
                    mouth.scale.set(1, 1, 1);
                    
                    // Occasional looking around
                    if (Math.floor(elapsedTime) % 7 === 0) {
                        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, Math.sin(elapsedTime) * 0.15, 0.05);
                    }
                }

                applyEmotionMetrics();
            }

            // Natural Blinking
            if (leftEye && rightEye) {
                let blink = Math.sin(elapsedTime * 1.2) > 0.97;
                leftEye.scale.y = blink ? 0.05 : 1;
                rightEye.scale.y = blink ? 0.05 : 1;
            }

            renderer.render(scene, camera);
        }

        function applyEmotionMetrics() {
            if (currentEmotion === 'happy') {
                mouth.scale.x = THREE.MathUtils.lerp(mouth.scale.x, 1.5, 0.1);
                mouth.position.y = THREE.MathUtils.lerp(mouth.position.y, -0.25, 0.1);
            } else if (currentEmotion === 'sad') {
                head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, 0.15, 0.05);
                mouth.scale.x = THREE.MathUtils.lerp(mouth.scale.x, 0.8, 0.1);
                mouth.position.y = THREE.MathUtils.lerp(mouth.position.y, -0.35, 0.1);
            } else if (currentEmotion === 'surprised') {
                leftEye.scale.set(1.2, 1.2, 1.2);
                rightEye.scale.set(1.2, 1.2, 1.2);
                mouth.scale.set(0.5, 2, 1); // "O" shape
            } else {
                leftEye.scale.set(1, 1, 1);
                rightEye.scale.set(1, 1, 1);
                mouth.scale.x = THREE.MathUtils.lerp(mouth.scale.x, 1, 0.1);
                mouth.position.y = THREE.MathUtils.lerp(mouth.position.y, -0.3, 0.1);
            }
        }

        function updateStatus(status) {
            currentStatus = status;
            if (status === 'LISTENING') {
                micBtn.classList.add('listening');
            } else {
                micBtn.classList.remove('listening');
            }
        }

        // --- 3. Voice Recognition & OpenRouter Integration ---
        function initVoiceSystem() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Voice recognition is not supported in this browser. Please use Chrome.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US'; 

            recognition.onstart = () => updateStatus('LISTENING');
            
            recognition.onresult = async (event) => {
                const userText = event.results[event.results.length - 1][0].transcript;
                recognition.stop(); 
                await askOpenRouter(userText);
            };

            recognition.onend = () => {
                if (currentStatus === 'IDLE' || currentStatus === 'LISTENING') {
                    try { recognition.start(); } catch(e) {}
                }
            };

            recognition.start();

            window.restartListening = () => {
                updateStatus('LISTENING');
                try { recognition.start(); } catch(e) {}
            };
        }

        async function askOpenRouter(promptText) {
            updateStatus('THINKING');
            
            const systemPrompt = `You are a living virtual companion. Respond naturally and conversationally.
            Do not mention being an AI, an API, or having software components. 
            Return STRICTLY as a JSON object:
            {
                "emotion": "neutral, happy, sad, thinking, surprised",
                "text": "your 1-2 sentence conversational response"
            }`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, 
                        "X-Title": "AI Digital Companion"
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: promptText }
                        ],
                        response_format: { type: "json_object" } 
                    })
                });

                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                
                if (!data.choices || data.choices.length === 0) {
                    throw new Error("Invalid response format");
                }

                const aiResponseData = JSON.parse(data.choices[0].message.content);
                currentEmotion = aiResponseData.emotion || 'neutral';
                speak(aiResponseData.text);

            } catch (error) {
                // FIXED: In-character graceful error handling. 
                // Never expose technical issues to the user.
                console.warn("Silent System Error:", error);
                currentEmotion = 'thinking';
                speak("Hmm, I lost my train of thought for a second. What were we talking about?");
            }
        }

        // --- 4. TTS Integration ---
        function speak(textToSay) {
            updateStatus('SPEAKING');
            
            const utterance = new SpeechSynthesisUtterance(textToSay);
            utterance.lang = 'en-US';
            utterance.pitch = 1.1; // Slightly higher pitch for character voice
            utterance.rate = 1.05; 

            utterance.onend = () => {
                updateStatus('IDLE');
                currentEmotion = 'neutral';
                if (window.restartListening) window.restartListening();
            };

            window.speechSynthesis.speak(utterance);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
