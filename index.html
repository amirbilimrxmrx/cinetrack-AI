<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Digital Companion - Funny Persian Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #a5d631; /* Bright green background from reference image */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl;
        }
        
        #canvas-container {
            width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; z-index: 1;
        }
        
        #mic-btn {
            position: absolute; bottom: 30px; right: 30px;
            width: 55px; height: 55px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            cursor: pointer; z-index: 10; display: flex;
            justify-content: center; align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        #mic-btn:hover {
            border-color: #2a8ada; transform: scale(1.15); background: rgba(255,255,255,0.3);
        }

        #mic-btn svg {
            width: 26px; height: 26px; fill: #2a8ada; transition: fill 0.3s ease;
        }

        .listening {
            animation: pulse 1.2s infinite; border-color: #2a8ada !important;
            background: rgba(42, 138, 218, 0.2) !important;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(42, 138, 218, 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(42, 138, 218, 0); }
            100% { box-shadow: 0 0 0 0 rgba(42, 138, 218, 0); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <button id="mic-btn" aria-label="Toggle Microphone">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>

    <script>
        // --- API Configuration ---
        const OPENROUTER_API_KEY = "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"; 
        const MODEL_NAME = "openai/gpt-4o-mini"; 

        // --- Graphics Variables ---
        let scene, camera, renderer, character, head, leftEye, rightEye, mouth;
        let leftPupil, rightPupil;
        let clock = new THREE.Clock();
        
        let currentStatus = 'IDLE'; 
        let currentEmotion = 'neutral'; 
        let isInitialized = false;
        let availableVoices = [];

        const micBtn = document.getElementById('mic-btn');

        // Load voices asynchronously to prevent empty speech queues
        function loadVoices() {
            availableVoices = window.speechSynthesis.getVoices();
        }
        loadVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        micBtn.addEventListener('click', () => {
            if (!isInitialized) {
                initGraphics();
                initVoiceSystem();
                isInitialized = true;
            } else {
                if (window.restartListening) window.restartListening();
            }
        });

        // --- 1. Character Setup (Centered Blue Character) ---
        function initGraphics() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 6.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.95);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.7);
            directionalLight.position.set(5, 8, 5);
            scene.add(directionalLight);

            character = new THREE.Group();
            
            // Blue Boxy-Rounded Head matching reference proportions
            const headGeo = new THREE.BoxGeometry(1.6, 1.2, 1.4); 
            const headMat = new THREE.MeshStandardMaterial({ color: 0x2a8ada, roughness: 0.3, metalness: 0.1 });
            head = new THREE.Mesh(headGeo, headMat);
            
            const scleraGeo = new THREE.SphereGeometry(0.25, 32, 32);
            const scleraMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });
            const pupilGeo = new THREE.SphereGeometry(0.11, 32, 32);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
            
            leftEye = new THREE.Mesh(scleraGeo, scleraMat);
            leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
            leftPupil.position.set(0, 0, 0.19);
            leftEye.add(leftPupil);
            leftEye.position.set(-0.35, 0.1, 0.7);
            head.add(leftEye);

            rightEye = new THREE.Mesh(scleraGeo, scleraMat);
            rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
            rightPupil.position.set(0, 0, 0.19);
            rightEye.add(rightPupil);
            rightEye.position.set(0.35, 0.1, 0.7);
            head.add(rightEye);

            const mouthGeo = new THREE.PlaneGeometry(0.6, 0.15);
            const mouthMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide });
            mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.3, 0.71);
            head.add(mouth);

            character.add(head);
            scene.add(character);
            
            animate();
        }

        // --- 2. Advanced Emotional Engine ---
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            if (head) {
                head.position.y = Math.sin(elapsedTime * 1.5) * 0.04;
                head.rotation.z = Math.sin(elapsedTime * 0.5) * 0.015;

                if (currentStatus === 'LISTENING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.4, 0.1);
                    head.rotation.x = (Math.sin(elapsedTime * 3) * 0.02) + 0.05;
                } else if (currentStatus === 'THINKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, -0.2, 0.1);
                    head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, -0.2, 0.05);
                } else if (currentStatus === 'SPEAKING') {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0.1, 0.1);
                    const mouthScaleY = 0.5 + Math.abs(Math.sin(elapsedTime * 18)) * 1.8;
                    mouth.scale.set(mouth.scale.x, mouthScaleY, 1);
                } else {
                    head.position.z = THREE.MathUtils.lerp(head.position.z, 0, 0.05);
                    if (Math.floor(elapsedTime) % 6 === 0) {
                        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, Math.sin(elapsedTime) * 0.15, 0.05);
                    } else {
                        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, 0, 0.05);
                    }
                }

                applyAdvancedEmotions(elapsedTime);
            }

            if (leftEye && rightEye && currentEmotion !== 'surprised' && currentEmotion !== 'excited') {
                let blink = Math.sin(elapsedTime * 1.2) > 0.98;
                leftEye.scale.y = blink ? 0.05 : leftEye.scale.y;
                rightEye.scale.y = blink ? 0.05 : rightEye.scale.y;
            }

            renderer.render(scene, camera);
        }

        function applyAdvancedEmotions(time) {
            let tMouthScaleX = 1, tMouthPosY = -0.3;
            let tLeftEyeScale = 1, tRightEyeScale = 1;
            let tPupilX = 0, tPupilY = 0.19; 
            let tHeadRotX = 0;

            switch(currentEmotion) {
                case 'happy':
                    tMouthScaleX = 1.6; tMouthPosY = -0.25;
                    break;
                case 'excited':
                    tMouthScaleX = 1.8; tMouthPosY = -0.22;
                    tLeftEyeScale = 1.15; tRightEyeScale = 1.15;
                    tHeadRotX = Math.sin(time * 8) * 0.05;
                    break;
                case 'sad':
                    tMouthScaleX = 0.7; tMouthPosY = -0.38;
                    tHeadRotX = 0.2; tPupilY = 0.15;
                    break;
                case 'surprised':
                    tMouthScaleX = 0.4; tMouthPosY = -0.3; 
                    tLeftEyeScale = 1.3; tRightEyeScale = 1.3;
                    break;
                case 'confused':
                    tMouthScaleX = 0.8; tMouthPosY = -0.28;
                    tLeftEyeScale = 1.1; tRightEyeScale = 0.8;
                    tHeadRotX = -0.1;
                    head.rotation.z = THREE.MathUtils.lerp(head.rotation.z, 0.15, 0.1);
                    break;
                case 'proud':
                    tMouthScaleX = 1.3; tMouthPosY = -0.28;
                    tHeadRotX = -0.15;
                    break;
                case 'shy':
                    tMouthScaleX = 0.9; tMouthPosY = -0.35;
                    tHeadRotX = 0.15; tPupilY = 0.23; tPupilX = 0.05;
                    break;
                case 'nervous':
                    tMouthScaleX = 0.6; tMouthPosY = -0.3;
                    tPupilX = Math.sin(time * 10) * 0.05;
                    tLeftEyeScale = 0.9; tRightEyeScale = 0.9;
                    break;
                case 'thinking':
                    tPupilX = -0.06; tPupilY = 0.25;
                    tMouthScaleX = 0.5;
                    break;
                default:
                    tMouthScaleX = 1; tMouthPosY = -0.3;
                    break;
            }

            mouth.scale.x = THREE.MathUtils.lerp(mouth.scale.x, tMouthScaleX, 0.1);
            if(currentStatus !== 'SPEAKING') mouth.position.y = THREE.MathUtils.lerp(mouth.position.y, tMouthPosY, 0.1);
            
            leftEye.scale.set(THREE.MathUtils.lerp(leftEye.scale.x, tLeftEyeScale, 0.1), THREE.MathUtils.lerp(leftEye.scale.y, tLeftEyeScale, 0.1), 1);
            rightEye.scale.set(THREE.MathUtils.lerp(rightEye.scale.x, tRightEyeScale, 0.1), THREE.MathUtils.lerp(rightEye.scale.y, tRightEyeScale, 0.1), 1);
            
            leftPupil.position.set(THREE.MathUtils.lerp(leftPupil.position.x, tPupilX, 0.1), THREE.MathUtils.lerp(leftPupil.position.y, tPupilY, 0.1), 0.19);
            rightPupil.position.set(THREE.MathUtils.lerp(rightPupil.position.x, tPupilX, 0.1), THREE.MathUtils.lerp(rightPupil.position.y, tPupilY, 0.1), 0.19);
            
            if(currentStatus !== 'LISTENING') head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, tHeadRotX, 0.1);
        }

        function updateStatus(status) {
            currentStatus = status;
            if (status === 'LISTENING') {
                micBtn.classList.add('listening');
            } else {
                micBtn.classList.remove('listening');
            }
        }

        // --- 3. Speech Recognition (Persian Language Setup) ---
        function initVoiceSystem() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("مرورگر شما از تشخیص صدا پشتیبانی نمی‌کند. لطفا از گوگل کروم استفاده کنید.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'fa-IR'; // Force Persian Speech Input

            recognition.onstart = () => updateStatus('LISTENING');
            
            recognition.onresult = async (event) => {
                const userText = event.results[event.results.length - 1][0].transcript;
                recognition.stop(); 
                await askOpenRouter(userText);
            };

            recognition.onend = () => {
                if (currentStatus === 'IDLE' || currentStatus === 'LISTENING') {
                    try { recognition.start(); } catch(e) {}
                }
            };

            recognition.start();

            window.restartListening = () => {
                updateStatus('LISTENING');
                try { recognition.start(); } catch(e) {}
            };
        }

        // --- 4. OpenRouter System Integration ---
        async function askOpenRouter(promptText) {
            updateStatus('THINKING');
            
            const systemPrompt = `You are "Nova", an incredibly cinematic, highly intelligent, and playfully witty digital assistant. 
            You must act exactly like an advanced interactive companion from futuristic animated movies.
            CRITICAL DIRECTIVES:
            1. You MUST speak and respond ONLY in natural, fluent Persian (Farsi).
            2. Your personality is energetic, fun, and highly expressive. Use playful tones.
            3. Never break character. Never state that you are an AI, code, or a script.
            4. Output your response STRICTLY as a valid JSON object matching this structure:
            {
                "emotion": "choose one: neutral, happy, sad, thinking, surprised, excited, confused, proud, shy, nervous",
                "text": "Your funny, animated Persian response here (1-2 sentences max)"
            }`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, 
                        "X-Title": "Nova Funny Companion"
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: promptText }
                        ],
                        response_format: { type: "json_object" } 
                    })
                });

                if (!response.ok) throw new Error("API Failure");
                const data = await response.json();
                
                let content = data.choices[0].message.content;
                content = content.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const aiResponseData = JSON.parse(content);
                currentEmotion = aiResponseData.emotion || 'neutral';
                speak(aiResponseData.text);

            } catch (error) {
                console.warn("Handled connection drops cleanly.", error);
                currentEmotion = 'excited';
                speak("اوه پسر! کانالمون داشت قطع و وصل می‌شد! دوباره بگو چی گفتی؟");
            }
        }

        // --- 5. Funny Text-To-Speech (TTS) Engine ---
        function speak(textToSay) {
            updateStatus('SPEAKING');
            
            // Clear out any stuck speech tracks in the browser queue immediately
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(textToSay);
            utterance.lang = 'fa-IR'; // Target Persian voice profiles
            
            // FUNNY VOICE TUNING: Max pitch + fast rate creates a cartoon/chipmunk tone
            utterance.pitch = 2.0;  
            utterance.rate = 1.25; 

            // Find an explicit Persian voice if available on system, otherwise fallback
            if (availableVoices.length > 0) {
                const faVoice = availableVoices.find(v => v.lang.includes('fa') || v.lang.includes('IR'));
                if (faVoice) utterance.voice = faVoice;
            }

            utterance.onend = () => {
                updateStatus('IDLE');
                currentEmotion = 'neutral';
                if (window.restartListening) window.restartListening();
            };

            // Execution buffer to dodge browser threading blocks
            setTimeout(() => { 
                window.speechSynthesis.speak(utterance); 
            }, 60);
        }

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
